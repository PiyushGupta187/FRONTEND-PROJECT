<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Resume<span>Craft</span></h1>
        <div class="header-actions">
            <button class="btn btn-ghost" onclick="clearAll()">↺ Clear</button>
            <button class="btn btn-accent" onclick="window.print()">⬇ Download PDF</button>
        </div>
    </header>

    <div class="app">
        <div class="editor">
            <nav class="tab-nav">
                <button class="tab-btn active" onclick="switchTab('info', event)">Info</button>
                <button class="tab-btn" onclick="switchTab('experience', event)">Experience</button>
                <button class="tab-btn" onclick="switchTab('education', event)">Education</button>
                <button class="tab-btn" onclick="switchTab('skills', event)">Skills</button>
                <button class="tab-btn" onclick="switchTab('design', event)">Design</button>
            </nav>

            <!-- INFO TAB -->
            <div id="tab-info" class="tab-panel active">
                <div class="section-label">Personal Details</div>
                <div class="field-group"><label>Full Name</label><input type="text" id="name"
                        placeholder="Enter your full name ( First name + Last name )" oninput="render()"></div>
                <div class="field-group"><label>Job Title</label><input type="text" id="jobtitle"
                        placeholder="Product Designer" oninput="render()"></div>
                <div class="field-group"><label>Summary</label><textarea id="summary"
                        placeholder="A brief professional summary..." oninput="render()"></textarea></div>
                <div class="section-label">Contact</div>
                <div class="field-row">
                    <div class="field-group"><label>Email</label><input type="email" id="email"
                            placeholder="name@email.com" oninput="render()"></div>
                    <div class="field-group"><label>Phone</label><input type="tel" id="phone"
                            placeholder="+91 XXXXX-XXXXX" oninput="render()"></div>
                </div>
                <div class="field-row">
                    <div class="field-group"><label>Location</label><input type="text" id="location"
                            placeholder="Bareilly , UP " oninput="render()"></div>
                    <div class="field-group"><label>Website</label><input type="url" id="website"
                            placeholder="linkedin.com/in/name" oninput="render()"></div>
                </div>
            </div>

            <!-- EXPERIENCE TAB -->
            <div id="tab-experience" class="tab-panel">
                <div id="exp-list"></div>
                <button class="btn-add" onclick="addEntry('exp')">+ Add Experience</button>
            </div>

            <!-- EDUCATION TAB -->
            <div id="tab-education" class="tab-panel">
                <div id="edu-list"></div>
                <button class="btn-add" onclick="addEntry('edu')">+ Add Education</button>
            </div>

            <!-- SKILLS TAB -->
            <div id="tab-skills" class="tab-panel">
                <div class="section-label">Skills</div>
                <div class="skill-input-row">
                    <input type="text" id="skill-input" placeholder="e.g. JavaScript"
                        onkeydown="if(event.key==='Enter')addSkill()">
                    <button class="btn" onclick="addSkill()">Add</button>
                </div>
                <div class="skills-grid" id="skills-display"></div>

                <div class="section-label" style="margin-top:0.5rem">Languages</div>
                <div class="skill-input-row">
                    <input type="text" id="lang-input" placeholder="e.g. Hindi — Native"
                        onkeydown="if(event.key==='Enter')addLang()">
                    <button class="btn" onclick="addLang()">Add</button>
                </div>
                <div class="skills-grid" id="langs-display"></div>
            </div>

            <!-- DESIGN TAB -->
            <div id="tab-design" class="tab-panel">
                <div class="section-label">Template</div>
                <div class="template-grid">
                    <div class="template-swatch selected" onclick="selectTemplate('classic', this)">
                        <div class="swatch-preview" style="background:#f0ede8; border:1px solid #ddd;">
                            <div style="height:14px;background:#1a1a2e;margin:6px 6px 4px;border-radius:1px;"></div>
                            <div style="height:3px;background:#1a1a2e;margin:0 6px 4px;"></div>
                            <div style="height:4px;background:#ddd;margin:0 6px 2px;border-radius:1px;"></div>
                            <div style="height:4px;background:#ddd;margin:0 6px 2px;width:60%;border-radius:1px;"></div>
                        </div>
                        <span>Classic</span>
                    </div>
                    <div class="template-swatch" onclick="selectTemplate('modern', this)">
                        <div class="swatch-preview" style="background:#f0ede8; border:1px solid #ddd;">
                            <div style="height:22px;background:#1a1a2e;margin:0;padding:6px 6px 0;"></div>
                            <div style="height:4px;background:#ddd;margin:6px 6px 2px;border-radius:1px;"></div>
                            <div style="height:4px;background:#ddd;margin:0 6px 2px;width:70%;border-radius:1px;"></div>
                        </div>
                        <span>Modern</span>
                    </div>
                    <div class="template-swatch" onclick="selectTemplate('sidebar', this)">
                        <div class="swatch-preview" style="background:#f0ede8; border:1px solid #ddd; display:flex;">
                            <div style="width:38%;background:#1a1a2e;height:100%;"></div>
                            <div style="flex:1;padding:5px 4px;display:flex;flex-direction:column;gap:3px;">
                                <div style="height:4px;background:#ddd;border-radius:1px;"></div>
                                <div style="height:4px;background:#ddd;border-radius:1px;width:70%;"></div>
                            </div>
                        </div>
                        <span>Sidebar</span>
                    </div>
                </div>

                <div class="section-label" style="margin-top:0.5rem">Accent Color</div>
                <div class="color-options" id="color-options">
                    <div class="color-dot active" style="background:#1a1a2e" data-color="#1a1a2e"
                        onclick="setColor(this)"></div>
                    <div class="color-dot" style="background:#c8773a" data-color="#c8773a" onclick="setColor(this)">
                    </div>
                    <div class="color-dot" style="background:#2563eb" data-color="#2563eb" onclick="setColor(this)">
                    </div>
                    <div class="color-dot" style="background:#16a34a" data-color="#16a34a" onclick="setColor(this)">
                    </div>
                    <div class="color-dot" style="background:#9333ea" data-color="#9333ea" onclick="setColor(this)">
                    </div>
                    <div class="color-dot" style="background:#dc2626" data-color="#dc2626" onclick="setColor(this)">
                    </div>
                    <div class="color-dot" style="background:#0891b2" data-color="#0891b2" onclick="setColor(this)">
                    </div>
                    <div class="color-dot" style="background:#4b5563" data-color="#4b5563" onclick="setColor(this)">
                    </div>
                </div>

                <div class="section-label" style="margin-top:0.5rem">Font Size</div>
                <div style="display:flex;align-items:center;gap:0.75rem;">
                    <span style="font-size:0.72rem;color:var(--ink-muted)">A</span>
                    <input type="range" min="90" max="115" value="100" id="font-scale"
                        oninput="setFontScale(this.value)">
                    <span style="font-size:0.88rem;color:var(--ink-muted)">A</span>
                </div>
            </div>
        </div>

        <!-- PREVIEW -->
        <div class="preview">
            <div class="resume-page classic" id="resume-page"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
